<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUVOX | Finalizar Orden</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght=600;700&family=Plus+Jakarta+Sans:wght=400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-[#030712] text-gray-300 min-h-screen antialiased py-12 px-4">

    <main class="max-w-2xl mx-auto glass-panel border border-gray-900 p-8 rounded-3xl shadow-2xl space-y-6">
        <div class="flex justify-between items-center border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-xl font-bold text-white font-display">Finalizar tu Compra</h1>
                <p class="text-xs text-gray-500 font-mono mt-1">Completá los datos para el despacho</p>
            </div>
            <a href="/" class="text-gray-400 hover:text-white text-xs font-bold">
                <i class="fa-solid fa-xmark mr-1"></i> Cancelar
            </a>
        </div>

        <form id="checkoutForm" class="space-y-4">
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-gray-500 font-mono font-bold mb-1">Nombre Completo</label>
                    <input type="text" id="checkoutName" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-gray-500 font-mono font-bold mb-1">Teléfono (WhatsApp)</label>
                    <input type="tel" id="checkoutPhone" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-purple-500">
                </div>
            </div>

            <div>
                <label class="block text-[10px] uppercase tracking-wider text-gray-500 font-mono font-bold mb-1">Email</label>
                <input type="email" id="checkoutEmail" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-purple-500">
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-gray-500 font-mono font-bold mb-1">Ciudad</label>
                    <input type="text" id="checkoutCity" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-purple-500">
                </div>
                <div>
                    <label class="block text-[10px] uppercase tracking-wider text-gray-500 font-mono font-bold mb-1">Dirección de Entrega</label>
                    <input type="text" id="checkoutAddress" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-4 py-3 text-xs text-white focus:outline-none focus:border-purple-500">
                </div>
            </div>

            <button type="submit" class="w-full mt-4 py-4 bg-gradient-to-r from-purple-500 to-cyan-500 text-white font-bold text-xs uppercase tracking-wider rounded-xl shadow-lg hover:opacity-95 transition-opacity">
                Procesar Orden
            </button>
        </form>
    </main>

    <script src="/static/index.js"></script>
</body>
</html>
