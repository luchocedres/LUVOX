<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>LUVOX | Credenciales</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="glass-panel p-8 rounded-3xl border border-gray-900 w-full max-w-sm space-y-6 shadow-2xl">
        <div class="text-center">
            <h2 class="font-display font-bold text-xl text-white">Ecosistema Interno</h2>
            <p class="text-[10px] text-gray-500 font-mono mt-1">Ingresá clave de autenticación</p>
        </div>
        
        {% if error %}
        <p class="text-red-400 text-xs font-mono text-center bg-red-950/20 p-2 rounded-xl border border-red-900/30">{{ error }}</p>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <label class="block text-[10px] uppercase text-gray-500 font-bold mb-1">Usuario</label>
                <input type="text" name="username" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-purple-500">
            </div>
            <div>
                <label class="block text-[10px] uppercase text-gray-500 font-bold mb-1">Contraseña</label>
                <input type="password" name="password" required class="w-full bg-gray-950 border border-gray-900 rounded-xl px-3 py-2 text-xs text-white focus:outline-none focus:border-purple-500">
            </div>
            <button type="submit" class="w-full py-3 bg-white text-black font-bold text-xs rounded-xl uppercase tracking-wider cursor-pointer">Validar Nodo</button>
        </form>
    </div>
</body>
</html>
